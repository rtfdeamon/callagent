<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Lab | Andreev AI</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --accent: #818cf8;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: linear-gradient(to bottom, #1e293b55, transparent);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .container {
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            padding-bottom: 4rem;
        }

        .main-card {
            background: var(--card);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 100px;
            background: rgba(255,255,255,0.05);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94a3b8;
        }

        .active .dot { background: #10b981; box-shadow: 0 0 10px #10b981; animation: pulse 2s infinite; }
        .thinking .dot { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .visualizer-box {
            height: 120px;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 2rem;
        }

        .bar {
            width: 4px;
            height: 10px;
            background: var(--primary);
            border-radius: 10px;
            transition: height 0.1s ease;
        }

        .btn-start {
            background: linear-gradient(to right, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 1.25rem 3rem;
            border-radius: 16px;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(56, 189, 248, 0.3);
        }

        .btn-start:active { transform: translateY(0); }

        .btn-stop {
            background: #ef4444;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2);
        }

        .transcript-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .msg {
            padding: 1rem 1.5rem;
            border-radius: 18px;
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            align-self: flex-end;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: var(--primary);
        }

        .agent-msg {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .debug-panel {
            margin-top: 2rem;
            width: 100%;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: grid;
            grid-template-cols: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .debug-item span { color: var(--primary); font-weight: bold; }

        .energy-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        #energy-fill {
            height: 100%;
            width: 0%;
            background: var(--primary);
            transition: width 0.1s ease;
        }

        .hint {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Voice Lab</h1>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">Живой диалог с Андреевым через WebSocket</p>
    </header>

    <div class="container">
        <div class="main-card">
            <div id="status" class="status-badge">
                <div class="dot"></div>
                <span id="status-text">Disconnected</span>
            </div>

            <div class="visualizer-box" id="visualizer">
                <!-- Bars generated by JS -->
            </div>

            <div class="energy-bar-container">
                <div id="energy-fill"></div>
            </div>

            <button id="start-btn" class="btn-start">Начать разговор</button>
            
            <div class="debug-panel">
                <div class="debug-item">Energy: <span id="debug-energy">0</span></div>
                <div class="debug-item">Silence: <span id="debug-silence">0.0</span>s</div>
                <div class="debug-item">Buffer: <span id="debug-buffer">0</span> B</div>
            </div>
        </div>

        <div class="transcript-container" id="transcript">
            <!-- Messages go here -->
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const statusDiv = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        const transcript = document.getElementById('transcript');
        const visualizer = document.getElementById('visualizer');

        let socket = null;
        let audioContext = null;
        let processor = null;
        let mediaStream = null;
        let isActive = false;

        // Создаем бары для визуализатора
        for(let i=0; i<30; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
        }
        const bars = document.querySelectorAll('.bar');

        function updateStatus(state, text) {
            statusDiv.className = 'status-badge ' + state;
            statusText.innerText = text;
        }

        function addMessage(who, text) {
            const msg = document.createElement('div');
            msg.className = `msg ${who}-msg`;
            msg.innerText = text;
            transcript.prepend(msg);
        }

        // Целевая частота для backend'а (Whisper в /ws ждёт PCM16 16 кГц).
        const TARGET_SR = 16000;

        // Линейный ресэмплер Float32 → Float32 для случаев, когда браузер
        // игнорирует sampleRate в AudioContext (Firefox, некоторые Safari).
        // Для STT-потока качество достаточное; полифазный фильтр не нужен.
        function resampleLinear(input, srcRate, dstRate) {
            if (srcRate === dstRate) return input;
            const ratio = srcRate / dstRate;
            const dstLen = Math.round(input.length / ratio);
            const out = new Float32Array(dstLen);
            for (let i = 0; i < dstLen; i++) {
                const srcIdx = i * ratio;
                const i0 = Math.floor(srcIdx);
                const i1 = Math.min(i0 + 1, input.length - 1);
                const frac = srcIdx - i0;
                out[i] = input[i0] * (1 - frac) + input[i1] * frac;
            }
            return out;
        }

        async function initAudio() {
            // Просим у браузера AudioContext с 16 кГц — Chrome/Edge/Safari
            // ресэмплят источник автоматически. Firefox может вернуть
            // фактическую частоту железа (44.1/48 кГц); тогда ресэмплим
            // в onaudioprocess вручную.
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: TARGET_SR });
            const actualSR = audioContext.sampleRate;
            if (actualSR !== TARGET_SR) {
                console.warn(`AudioContext не соблюдает 16 кГц: actual=${actualSR}. Включён клиентский ресэмплер.`);
            }

            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioContext.createMediaStreamSource(mediaStream);

            // ScriptProcessor для простоты (PCM 16bit Int16)
            processor = audioContext.createScriptProcessor(4096, 1, 1);

            source.connect(processor);
            processor.connect(audioContext.destination);

            processor.onaudioprocess = (e) => {
                if (!isActive || !socket || socket.readyState !== WebSocket.OPEN) return;

                let floatData = e.inputBuffer.getChannelData(0);
                // Гарантируем 16 кГц на выходе вне зависимости от того,
                // что вернул браузер.
                if (actualSR !== TARGET_SR) {
                    floatData = resampleLinear(floatData, actualSR, TARGET_SR);
                }

                // Конвертируем Float32 → Int16
                const int16Data = new Int16Array(floatData.length);
                for (let i = 0; i < floatData.length; i++) {
                    int16Data[i] = Math.max(-1, Math.min(1, floatData[i])) * 0x7FFF;
                }

                socket.send(int16Data.buffer);

                // Визуализация (по исходному float, до ресэмпла — точнее
                // отражает уровень микрофона)
                const orig = e.inputBuffer.getChannelData(0);
                const level = Math.sqrt(orig.reduce((s, x) => s + x*x, 0) / orig.length);
                bars.forEach((b, idx) => {
                    const h = 10 + (level * 200 * Math.sin(Date.now()/200 + idx/5));
                    b.style.height = `${Math.min(100, h)}px`;
                });
            };
        }

        async function startSession() {
            if (isActive) {
                stopSession();
                return;
            }

            try {
                await initAudio();
                
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                socket = new WebSocket(`${protocol}//${window.location.host}/ws`);
                
                socket.onopen = () => {
                    isActive = true;
                    startBtn.innerText = 'Остановить';
                    startBtn.classList.add('btn-stop');
                    updateStatus('active', 'Listening');
                };

                socket.onmessage = async (event) => {
                    if (typeof event.data === 'string') {
                        const data = JSON.parse(event.data);
                        
                        if (data.type === 'debug') {
                            document.getElementById('debug-energy').innerText = data.energy;
                            document.getElementById('debug-silence').innerText = data.silence;
                            document.getElementById('debug-buffer').innerText = data.buffer_size;
                            
                            // Обновляем шкалу энергии (макс 32767)
                            const percent = Math.min(100, (data.energy / 5000) * 100);
                            document.getElementById('energy-fill').style.width = percent + '%';
                            
                            return;
                        }

                        if (data.type === 'stt_result') {
                            addMessage('user', data.text);
                            updateStatus('thinking', 'Processing...');
                        } else if (data.type === 'llm_response') {
                            addMessage('agent', data.text);
                            updateStatus('active', 'Speaking');
                        } else if (data.type === 'error') {
                            console.error(data.message);
                        }
                    } else {
                        // Бинарные данные (WAV)
                        const blob = new Blob([event.data], { type: 'audio/wav' });
                        const url = URL.createObjectURL(blob);
                        const audio = new Audio(url);
                        await audio.play();
                        audio.onended = () => {
                            updateStatus('active', 'Listening');
                        };
                    }
                };

                socket.onclose = () => stopSession();
                socket.onerror = (e) => console.error(e);

            } catch (err) {
                console.error(err);
                alert('Не удалось получить доступ к микрофону или подключиться к серверу');
            }
        }

        function stopSession() {
            isActive = false;
            if (socket) socket.close();
            if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            if (audioContext) audioContext.close();
            
            startBtn.innerText = 'Начать разговор';
            startBtn.classList.remove('btn-stop');
            updateStatus('', 'Disconnected');
            bars.forEach(b => b.style.height = '10px');
        }

        startBtn.onclick = startSession;
    </script>
</body>
</html>
